name: Automated Pull Request Builder

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr:
    name: Build Auto Pull Request
    # Skip runs triggered by the automation user or github-actions bot
    if: github.actor != 'brotherlogic-automation' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create or Update Pull Request
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "Processing branch push: $BRANCH_NAME by @${{ github.actor }}"

          # Clean and trim the personal token to prevent invalid header field value errors
          CLEANED_TOKEN=$(echo "$PERSONAL_TOKEN" | tr -d '\r\n[:space:]')
          
          # Actively validate the PERSONAL_TOKEN credentials
          TOKEN_VALID=false
          if [ -n "$CLEANED_TOKEN" ]; then
            echo "Validating PERSONAL_TOKEN credentials..."
            if GH_TOKEN="$CLEANED_TOKEN" gh api user --json login > /dev/null 2>&1; then
              echo "PERSONAL_TOKEN credentials are valid!"
              TOKEN_VALID=true
            else
              echo "WARNING: PERSONAL_TOKEN credentials returned HTTP 401 Bad Credentials or expired."
            fi
          fi

          if [ "$TOKEN_VALID" = true ]; then
            echo "Using provided PERSONAL_TOKEN for authentication."
            export GH_TOKEN="$CLEANED_TOKEN"
          else
            echo "Falling back to GITHUB_TOKEN for workflow authentication."
            export GH_TOKEN="$GITHUB_TOKEN"
          fi

          # Check if a pull request already exists for this head branch
          PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number')

          if [ -z "$PR_EXISTS" ]; then
            echo "No active Pull Request found. Instantiating a new PR..."
            gh pr create \
              --title "Auto PR: $BRANCH_NAME" \
              --body "This pull request was automatically generated by our PR Builder on behalf of @${{ github.actor }}." \
              --head "$BRANCH_NAME" \
              --base main \
              --assignee "${{ github.actor }}"
          else
            echo "Pull Request already exists for this branch: #$PR_EXISTS. Skipping creation."
          fi
